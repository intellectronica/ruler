name: Ruler Apply

on:
  push:
  workflow_dispatch: {}

concurrency:
  group: ruler-apply-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  apply-ruler:
    if: ${{ github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message || '', 'Ruler:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          check-latest: true
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build ruler
        run: npm run build

      - name: Run ruler apply
        run: |
          node dist/cli/index.js apply --no-gitignore --no-backup --agents=agentsmd,copilot

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            # Configure committer identity (author is set explicitly via --author)
            git config user.name "Ruler"
            git config user.email "ruler+workflow@okigu.com"
            git add .
            git commit -m "Ruler: updating AI agent rules" --author="Ruler <ruler+workflow@okigu.com>" || echo "No changes to commit"
            git push
          else
            echo "No changes"
          fi
